function typetitle(text,speed){
	return new Promise((resolve)=>{
		let index=0;
		const suffix="｜ヨトゥン公式サイト";
		function tick(){
			if(index<text.length){
				document.title=text.substring(0,index+1)+suffix;
				index++;
				setTimeout(tick,speed);
			}else{
			document.title=text+suffix;
			resolve();
			}
		}
		tick();
	});
}
function typetext(el,text,speed){
	return new Promise((resolve)=>{
		let index=0;
		el.classList.add("typing");
		function tick(){
			const waitwatch=text.substring(index).match(/^\[wait:(\d+)\]/);
			const share=text.substring(index).match(/^\[btn:(.+?)\|(.+?)\]/);
			if (share){
				const url=share[1];
				const label=share[2];
				const btn=document.createElement("a");
				btn.href=url;
				btn.textContent=label;
				btn.className="sharebutton";
				btn.target="_blank";
				el.appendChild(btn);
				triggerglitch(btn);
				index+=share[0].length;
				setTimeout(tick,speed);
				return;
			}
			function triggerglitch(target){
				for(let i=0;i<4;i++){
					const rect=target.getBoundingClientRect();
					const glitch=document.createElement("div");
					glitch.className="glitch";
					const dx=(Math.random()-0.5)*40;
					const dy=(Math.random()-0.5)*5;
					glitch.style.top=rect.top+window.scrollY +"px";
					glitch.style.left=rect.left+window.scrollX+"px";
					glitch.style.width=rect.width+"px";
					glitch.style.height=rect.height+"px";
					glitch.style.setProperty("--dx",dx+"px");
					glitch.style.setProperty("--dy",dy+"px");
					const top=Math.random()*100;
					const bottom=Math.random()*(100-top);
					glitch.style.clipPath = `inset(${top}% 0 ${bottom}% 0)`;
					glitch.style.animationDelay = (Math.random() * 0.1) + "s";
					const colors=["red","cyan","lime","magenta","yellow"];
					glitch.style.background=colors[i];
					glitch.textContent=target.textContent;
					document.body.appendChild(glitch);
					setTimeout(()=>{glitch.remove();},300);
				}
			}
			if(waitwatch){
				const waitTime=parseInt(waitwatch[1]);
				index+=waitwatch[0].length;
				setTimeout(tick,waitTime);
				return;
			}
			if(index<text.length){
				if(text[index]==="\n"){
					el.appendChild(document.createElement("br"));
				}else el.append(text[index]);
				index++;
				setTimeout(tick,speed);
			}else {
				el.classList.remove("typing");
				resolve();
			}
		}
		tick();
	});
}
function wait(ms){
	return new Promise(resolve=>setTimeout(resolve,ms));
}
